<section class="container mx-auto py-20 px-4 bg-muted/50" id="contact">
  <h2 class="text-3xl font-bold mb-12 text-center">Get In Touch</h2>
  <div class="max-w-md mx-auto">
    <form (ngSubmit)="onSubmit()" #form="ngForm" class="space-y-6">
      <div class="space-y-2">
        <label for="name" class="label">Name</label>
        <input id="name" name="name" placeholder="Your name" class="input" [(ngModel)]="contactForm.name" required #name="ngModel" />
         <div *ngIf="name.invalid && (name.dirty || name.touched)" class="text-destructive text-xs mt-1">
            Name is required.
        </div>
      </div>
      <div class="space-y-2">
        <label for="email" class="label">Email</label>
        <input id="email" name="email" type="email" placeholder="your.email@example.com" class="input" [(ngModel)]="contactForm.email" required email #email="ngModel"/>
         <div *ngIf="email.invalid && (email.dirty || email.touched)" class="text-destructive text-xs mt-1">
           <span *ngIf="email.errors?.['required']">Email is required.</span>
           <span *ngIf="email.errors?.['email']">Please enter a valid email address.</span>
        </div>
      </div>
      <div class="space-y-2">
        <label for="message" class="label">Message</label>
        <textarea id="message" name="message" placeholder="Your message" rows="5" class="textarea" [(ngModel)]="contactForm.message" required #message="ngModel"></textarea>
         <div *ngIf="message.invalid && (message.dirty || message.touched)" class="text-destructive text-xs mt-1">
            Message is required.
        </div>
      </div>
      <button type="submit" class="btn btn-default w-full" [disabled]="form.invalid">
        <lucide-icon name="send" size="18"></lucide-icon>
        Send Message
      </button>
    </form>
  </div>
</section>
