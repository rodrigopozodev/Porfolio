<section class="container mx-auto py-20 px-4 bg-muted/50" id="contact">
  <h2 class="text-3xl font-bold mb-12 text-center">Ponte en Contacto</h2>
  <div class="max-w-md mx-auto">
    <form (ngSubmit)="onSubmit()" #form="ngForm" class="space-y-6">
      <div class="space-y-2">
        <label for="name" class="label">Nombre</label>
        <input id="name" name="name" placeholder="Tu nombre" class="input" [(ngModel)]="contactForm.name" required #name="ngModel" />
         <div *ngIf="name.invalid && (name.dirty || name.touched)" class="text-destructive text-xs mt-1">
            El nombre es obligatorio.
        </div>
      </div>
      <div class="space-y-2">
        <label for="email" class="label">Correo Electrónico</label>
        <input id="email" name="email" type="email" placeholder="tu.email@ejemplo.com" class="input" [(ngModel)]="contactForm.email" required email #email="ngModel"/>
         <div *ngIf="email.invalid && (email.dirty || email.touched)" class="text-destructive text-xs mt-1">
           <span *ngIf="email.errors?.['required']">El correo electrónico es obligatorio.</span>
           <span *ngIf="email.errors?.['email']">Por favor, introduce una dirección de correo válida.</span>
        </div>
      </div>
      <div class="space-y-2">
        <label for="subject" class="label">Asunto</label>
        <input id="subject" name="subject" placeholder="Asunto del mensaje" class="input" [(ngModel)]="contactForm.subject" required #subject="ngModel"/>
         <div *ngIf="subject.invalid && (subject.dirty || subject.touched)" class="text-destructive text-xs mt-1">
            El asunto es obligatorio.
        </div>
      </div>
      <div class="space-y-2">
        <label for="message" class="label">Mensaje</label>
        <textarea id="message" name="message" placeholder="Tu mensaje" rows="5" class="textarea" [(ngModel)]="contactForm.message" required #message="ngModel"></textarea>
         <div *ngIf="message.invalid && (message.dirty || message.touched)" class="text-destructive text-xs mt-1">
            El mensaje es obligatorio.
        </div>
      </div>
      <button type="submit" class="btn btn-default w-full" [disabled]="form.invalid">
        <lucide-icon name="send" size="18"></lucide-icon>
        Enviar Mensaje
      </button>
    </form>
  </div>
</section>
