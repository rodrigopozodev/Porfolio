<div class="relative">
  <!-- Botón para abrir el panel de temas -->
  <button #toggleBtn (click)="togglePanel()" class="btn btn-outline btn-icon" [attr.aria-label]="'theme.selectAria' | t">
    <lucide-icon name="paint-roller" class="h-[1.2rem] w-[1.2rem]"></lucide-icon>
  </button>

  <!-- Panel de temas fijo en la parte superior que empuja el contenido hacia abajo -->
  <div *ngIf="showPanel" class="fixed inset-x-0 top-0 z-50" #panelRef>
    <div class="relative bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/75 border-b shadow-sm">
      <div class="container mx-auto px-4">
        <!-- Cabecera más compacta con título centrado -->
        <div class="relative py-2">
          <div class="flex items-center justify-center">
            <span class="text-xs font-semibold tracking-wide text-muted-foreground uppercase">{{ 'theme.panelTitle' | t }}</span>
          </div>
          <button (click)="closePanel()" class="absolute right-2 top-2 btn btn-ghost w-8 h-8 text-xl leading-none" [attr.aria-label]="'theme.closeAria' | t">×</button>
        </div>

        <nav class="w-full">
          <div class="pb-3">
            <div class="flex gap-3 overflow-x-auto pb-2 justify-center">
              <button
                *ngFor="let t of themes"
                #themeBtn
                [attr.data-theme]="t"
                (click)="setTheme(t, $event)"
                class="group w-[88px] h-[56px] flex flex-col justify-between items-center gap-1 rounded-md border px-2 py-1"
                [style.backgroundColor]="getPalette(t).background"
                [style.borderColor]="getPalette(t).accent"
                [style.color]="getPalette(t).text"
              >
                <span class="text-xs font-medium leading-snug text-center w-full min-h-[24px]">
                  {{ shortName(t) }}
                </span>
                <div class="flex items-center gap-0 pb-0">
                  <span *ngFor="let c of [getPalette(t).accent, getPalette(t).secondary, getPalette(t).surface, getPalette(t).text, getPalette(t).background]; let i = index"
                          class="h-4 w-4 rounded-full"
                          [ngClass]="{'-ml-1': i > 0}"
                          [style.backgroundColor]="c"></span>
                </div>
              </button>
            </div>
          </div>
        </nav>
        <!-- Triángulo indicador del tema activo, apuntando hacia arriba y encima de la línea -->
        <div class="pointer-events-none absolute bottom-0 left-0"
             [style.left.px]="arrowLeft"
             style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:12px solid;transform: translateX(-50%);"
             [style.borderBottomColor]="'hsl(var(--accent))'"></div>
      </div>
    </div>
  </div>
</div>
