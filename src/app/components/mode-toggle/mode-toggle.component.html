<div class="relative" (document:click)="handleClickOutside($event)">
  <button (click)="toggleDropdown()" class="btn btn-outline btn-icon">
    <lucide-icon name="sun" class="h-[1.2rem] w-[1.2rem] transition-all" [class.dark:-rotate-90]="isDarkMode" [class.dark:scale-0]="isDarkMode" [class.rotate-0]="!isDarkMode" [class.scale-100]="!isDarkMode"></lucide-icon>
    <lucide-icon name="moon" class="absolute h-[1.2rem] w-[1.2rem] transition-all" [class.dark:rotate-0]="isDarkMode" [class.dark:scale-100]="isDarkMode" [class.rotate-90]="!isDarkMode" [class.scale-0]="!isDarkMode"></lucide-icon>
    <span class="sr-only">Toggle theme</span>
  </button>
  <div *ngIf="showDropdown"
       class="dropdown-menu-content absolute right-0 mt-2 w-48 origin-top-right rounded-md shadow-lg"
       @fadeInOut> <!-- Optional: Add animation -->
    <div class="py-1" role="menu" aria-orientation="vertical" aria-labelledby="options-menu">
      <button (click)="setTheme('light')" class="dropdown-menu-item w-full text-left">
        Light
      </button>
      <button (click)="setTheme('dark')" class="dropdown-menu-item w-full text-left">
        Dark
      </button>
      <button (click)="setTheme('system')" class="dropdown-menu-item w-full text-left">
        System
      </button>
    </div>
  </div>
</div>
