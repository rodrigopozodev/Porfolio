<footer class="py-8 px-4 border-t">
  <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
    <p class="text-muted-foreground text-sm">© {{currentYear}} Rodrigo Pozo Sánchez. Todos los derechos reservados.</p>
    <div class="flex gap-4">
      <a [href]="githubLink" target="_blank" rel="noopener noreferrer" class="btn btn-ghost btn-icon">
        <lucide-icon name="github" size="20"></lucide-icon>
         <span class="sr-only">GitHub</span>
      </a>
      <a [href]="emailLink" class="btn btn-ghost btn-icon">
        <lucide-icon name="mail" size="20"></lucide-icon>
         <span class="sr-only">Correo Electrónico</span>
      </a>
      <!-- Añadir otros enlaces sociales según sea necesario -->
    </div>
  </div>
</footer>

<script>
  // Script simple para establecer el año actual, evitando la dependencia de Angular si es posible
  document.addEventListener('DOMContentLoaded', () => {
    const yearSpan = document.querySelector('footer p'); // Ajustar selector si es necesario
    if (yearSpan) {
       const currentYear = new Date().getFullYear();
       yearSpan.textContent = yearSpan.textContent?.replace('{{currentYear}}', currentYear.toString()) ?? '';
    }
  });
</script>
